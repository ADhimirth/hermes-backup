name: hermes-backup
version: 1.0.0
description: Multi-storage backup plugin for Hermes Agent — back up config, state, skills, and profiles to S3 (extensible to GDrive, Dropbox, etc.)
author: rele
provides_tools:
  - backup_now
  - backup_status
  - backup_list
  - backup_restore
provides_hooks:
  - on_session_end
requires_env:
  - name: HERMES_BACKUP_PROVIDER
    description: "Backup provider (default: s3)"
  - name: AWS_ACCESS_KEY_ID
    description: "AWS access key for S3 backup provider"
    url: "https://aws.amazon.com/console/"
    secret: true
  - name: AWS_SECRET_ACCESS_KEY
    description: "AWS secret key for S3 backup provider"
    url: "https://aws.amazon.com/console/"
    secret: true
  - name: AWS_DEFAULT_REGION
    description: "AWS region for S3 (e.g. us-east-1)"
  - name: HERMES_BACKUP_S3_BUCKET
    description: "S3 bucket name for backups"